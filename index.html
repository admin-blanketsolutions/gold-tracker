<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Precious Metals Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Loading state ── -->
  <div id="state-loading" class="state-screen" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <p>Fetching prices…</p>
  </div>

  <!-- ── Error state ── -->
  <div id="state-error" class="state-screen hidden" role="alert">
    <p class="error-icon" aria-hidden="true">⚠</p>
    <p id="error-msg">Could not load price data.</p>
    <button id="btn-retry">Retry</button>
  </div>

  <!-- ── Main content ── -->
  <main id="state-main" class="hidden">

    <header>
      <h1>Precious Metals Tracker</h1>
      <p id="subtitle" class="subtitle"></p>
      <p id="updated" class="updated"></p>
    </header>

    <!-- Price cards -->
    <section class="cards" aria-label="Spot prices">

      <article class="card" id="card-gold">
        <div class="card-header">
          <span class="metal-symbol" aria-hidden="true">Au</span>
          <h2>Gold</h2>
          <span class="badge" id="gold-badge">—</span>
        </div>
        <table class="karat-table" aria-label="Gold prices by karat">
          <thead>
            <tr>
              <th></th>
              <th>/troy oz</th>
              <th>/gram</th>
            </tr>
          </thead>
          <tbody>
            <tr class="karat-row karat-24">
              <td class="karat-label">24K</td>
              <td id="gold-24k-oz">—</td>
              <td id="gold-24k-gram">—</td>
            </tr>
            <tr class="karat-row karat-21">
              <td class="karat-label">21K</td>
              <td id="gold-21k-oz">—</td>
              <td id="gold-21k-gram">—</td>
            </tr>
            <tr class="karat-row karat-18">
              <td class="karat-label">18K</td>
              <td id="gold-18k-oz">—</td>
              <td id="gold-18k-gram">—</td>
            </tr>
          </tbody>
        </table>
      </article>

      <article class="card" id="card-silver">
        <div class="card-header">
          <span class="metal-symbol" aria-hidden="true">Ag</span>
          <h2>Silver</h2>
          <span class="badge" id="silver-badge">—</span>
        </div>
        <table class="karat-table" aria-label="Silver prices by purity">
          <thead>
            <tr>
              <th></th>
              <th>/troy oz</th>
              <th>/gram</th>
            </tr>
          </thead>
          <tbody>
            <tr class="karat-row purity-999">
              <td class="karat-label">999</td>
              <td id="silver-999-oz">—</td>
              <td id="silver-999-gram">—</td>
            </tr>
            <tr class="karat-row purity-925">
              <td class="karat-label">925</td>
              <td id="silver-925-oz">—</td>
              <td id="silver-925-gram">—</td>
            </tr>
          </tbody>
        </table>
      </article>

    </section>

    <!-- Chart section -->
    <section class="chart-section" aria-label="Monthly price history">
      <div class="chart-header">
        <h2>Monthly Price History</h2>
        <div class="tab-group" role="tablist" aria-label="Metal selection">
          <button class="tab active" id="tab-gold" role="tab" aria-selected="true" aria-controls="chart-container">Gold</button>
          <button class="tab" id="tab-silver" role="tab" aria-selected="false" aria-controls="chart-container">Silver</button>
        </div>
      </div>
      <div id="chart-container" role="tabpanel">
        <canvas id="price-chart" aria-label="Monthly price history chart"></canvas>
      </div>
      <p id="chart-note" class="chart-note hidden"></p>
    </section>

    <!-- Portfolio section -->
    <section class="portfolio-section" aria-label="My holdings">
      <h2 class="section-title">My Holdings</h2>

      <div class="holding-row">
        <span class="holding-label">
          <span class="metal-symbol" aria-hidden="true">Au</span> Gold
        </span>
        <div class="holding-inputs">
          <label class="input-group">
            <input type="number" id="gold-oz-input" min="0" step="any" placeholder="0" />
            <span class="input-unit">oz</span>
          </label>
          <label class="input-group">
            <input type="number" id="gold-gram-input" min="0" step="any" placeholder="0" />
            <span class="input-unit">g</span>
          </label>
        </div>
      </div>

      <div class="holding-row">
        <span class="holding-label">
          <span class="metal-symbol" aria-hidden="true">Ag</span> Silver
        </span>
        <div class="holding-inputs">
          <label class="input-group">
            <input type="number" id="silver-oz-input" min="0" step="any" placeholder="0" />
            <span class="input-unit">oz</span>
          </label>
          <label class="input-group">
            <input type="number" id="silver-gram-input" min="0" step="any" placeholder="0" />
            <span class="input-unit">g</span>
          </label>
        </div>
      </div>

      <div class="portfolio-results">
        <div class="result-row">
          <span>Gold value</span>
          <span id="portfolio-gold-value">—</span>
        </div>
        <div class="result-row">
          <span>Silver value</span>
          <span id="portfolio-silver-value">—</span>
        </div>
        <div class="result-divider"></div>
        <div class="result-row net-worth-row">
          <span>Total holdings</span>
          <strong id="portfolio-total">—</strong>
        </div>
      </div>
    </section>

  </main>

  <!-- Chart.js 4 via jsDelivr with SRI -->
  <script
    src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
    integrity="sha256-IGtui7APx7uix+6AykHbPp4FunvgqjWr66nP1TV/XQ4="
    crossorigin="anonymous"
  ></script>
  <script src="app.js"></script>

</body>
</html>
